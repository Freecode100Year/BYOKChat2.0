name = "byok-chat"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# 纯 BYOK 多供应商：服务器不保存任何东西，无需 KV、无需服务端 key。
# 可选环境变量：
#   SITE_NAME          站点名称
#   ACCESS_PASSWORD    访问口令（可选，给整站加一道口令）
#   IMAGE_MODEL        文生图默认模型（默认 dall-e-3）
#   PRESET_PROVIDERS   预设供应商 JSON（可选），形如：
#                      [{"name":"OpenRouter","baseUrl":"https://openrouter.ai/api/v1","models":["openai/gpt-4o","anthropic/claude-3.5-sonnet"]}]
#   API_BASE + MODELS  向后兼容：作为单个默认供应商预设
